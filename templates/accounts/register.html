{% extends "base.html" %}
{% block title %}Register - Doc DMS{% endblock %}

{% block content %}
<h1>Register</h1>
<form method="post">
  {% csrf_token %}
  {{ form.non_field_errors }}
  <table>{{ form.as_table }}</table>
  <br>
  <button type="submit" class="btn">Create Account</button>
</form>
<p style="margin-top: 1rem;">Already have an account? <a href="{% url 'login' %}">Login</a></p>
{% endblock %}
