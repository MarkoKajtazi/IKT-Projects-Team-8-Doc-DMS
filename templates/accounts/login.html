{% extends "base.html" %}
{% block title %}Login - Doc DMS{% endblock %}

{% block content %}
<h1>Login</h1>
<form method="post">
  {% csrf_token %}
  {% if form.errors %}
    <p style="color: #dc2626;">Invalid username or password.</p>
  {% endif %}
  <table>{{ form.as_table }}</table>
  <br>
  <button type="submit" class="btn">Login</button>
</form>
<p style="margin-top: 1rem;">Don't have an account? <a href="{% url 'register' %}">Register</a></p>
{% endblock %}
